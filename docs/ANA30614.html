<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>ბავშვის მიერ ენის ათვისების მონახაზი — GCLS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@400;500;600;700&family=Noto+Serif+Georgian:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    --ink:        #0a0a0a;
    --ink-2:      #2a2a2a;
    --ink-3:      #5e5e5e;
    --ink-4:      #909090;
    --ink-5:      #c4c4c4;
    --paper:      #ffffff;
    --paper-2:    #f6f6f6;
    --paper-3:    #ededed;
    --line:       #e6e6e6;
    --line-2:     #d4d4d4;
    --accent:     #0a0a0a;
    --accent-2:   #2a2a2a;
    --accent-bg:  #f0f0f0;
    --chi:        #0a0a0a;
    --mot:        #909090;

    --font-sans:  'Noto Sans Georgian', system-ui, -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    --font-serif: 'Noto Serif Georgian', 'Iowan Old Style', 'Charter', Georgia, serif;
    --font-mono:  'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--paper); color: var(--ink); }
  body {
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  ::selection { background: var(--ink); color: var(--paper); }

  /* —— shell —— */
  .shell {
    max-width: 1280px; margin: 0 auto;
    padding: 40px 36px 64px;
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 56px;
    align-items: start;
  }
  .main { min-width: 0; }

  /* —— file sidebar —— */
  .file-nav {
    position: sticky;
    top: 24px;
    padding-top: 8px;
    border-right: 1px solid var(--line);
    padding-right: 24px;
    margin-right: -24px;
  }
  .file-nav h2 {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-3);
    font-weight: 500;
    margin-bottom: 4px;
  }
  .file-nav .nav-sub {
    font-size: 11px;
    color: var(--ink-4);
    margin-bottom: 22px;
    line-height: 1.5;
  }
  .file-group { margin-bottom: 22px; }
  .file-group-head {
    display: flex; align-items: baseline; justify-content: space-between;
    padding: 6px 0;
    border-bottom: 1px solid var(--line);
    margin-bottom: 6px;
  }
  .file-group-name {
    font-family: var(--font-sans);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.04em;
  }
  .file-group-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.06em;
  }
  .file-list { display: flex; flex-direction: column; }
  .file-item {
    display: block;
    background: none; border: none; cursor: pointer;
    text-align: left;
    padding: 5px 8px 5px 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    text-decoration: none;
    width: 100%;
    letter-spacing: 0.02em;
    border-left: 1px solid transparent;
    margin-left: -1px;
    line-height: 1.4;
  }
  .file-item:hover { color: var(--ink); }
  .file-item.active {
    color: var(--ink);
    border-left-color: var(--ink);
    font-weight: 500;
    background: var(--paper-2);
  }
  .file-item .ext { color: var(--ink-4); }
  .file-item.active .ext { color: var(--ink-3); }

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; gap: 24px; padding: 28px 24px 48px; }
    .file-nav { position: static; border-right: none; border-bottom: 1px solid var(--line); padding-right: 0; margin-right: 0; padding-bottom: 18px; }
    .file-list { flex-direction: row; flex-wrap: wrap; gap: 4px 6px; }
    .file-item { width: auto; padding: 4px 8px; border-left: none; border: 1px solid var(--line); margin-left: 0; }
    .file-item.active { border-color: var(--ink); background: var(--paper-2); }
  }

  /* —— masthead —— */
  .masthead {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 24px;
    align-items: end;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
  }
  .brand-row {
    display: flex; align-items: center; gap: 10px;
    font-family: var(--font-mono);
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 14px;
  }
  .brand-sep { color: var(--ink-5); }
  h1.title {
    font-family: var(--font-serif);
    font-size: 32px;
    font-weight: 500;
    line-height: 1.18;
    letter-spacing: -0.005em;
    color: var(--ink);
    max-width: 660px;
    text-wrap: balance;
    margin: 0;
  }
  .title-en {
    font-family: var(--font-serif);
    font-size: 15px;
    font-style: italic;
    color: var(--ink-4);
    margin-top: 6px;
    letter-spacing: 0.005em;
  }
  .subtitle {
    margin-top: 14px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-3);
    max-width: 580px;
    line-height: 1.5;
  }
  .subtitle-en {
    margin-top: 4px;
    font-family: var(--font-serif);
    font-style: italic;
    font-size: 12px;
    color: var(--ink-4);
    max-width: 580px;
    line-height: 1.55;
  }

  .file-card {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    text-align: right;
    line-height: 1.8;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .file-card .id {
    display: inline-block;
    color: var(--ink);
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 0.06em;
    margin-bottom: 2px;
  }

  /* —— meta row (child + age + date) —— */
  .meta-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0;
    margin-top: 24px;
    border-bottom: 1px solid var(--line);
  }
  .meta-cell {
    padding: 14px 0;
    padding-right: 24px;
  }
  .meta-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    margin-bottom: 6px;
  }
  .meta-value {
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
  }
  .meta-value.mono { font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0.02em; }

  /* —— stat strip —— */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    margin-top: 0;
    border-bottom: 1px solid var(--line);
  }
  .stat {
    padding: 18px 0 22px;
    padding-right: 18px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .stat-num {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 500;
    color: var(--ink);
    font-variant-numeric: lining-nums tabular-nums;
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .stat-num .unit { font-family: var(--font-serif); font-style: italic; font-size: 13px; color: var(--ink-3); margin-left: 4px; font-weight: 400; }
  .stat-label {
    font-size: 10px; color: var(--ink-4);
    font-family: var(--font-mono);
    text-transform: uppercase; letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* —— tabs —— */
  .tabs {
    margin-top: 36px;
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--line);
    align-items: flex-end;
  }
  .tab {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-3);
    padding: 10px 0 14px;
    margin-right: 28px;
    border-bottom: 1px solid transparent;
    margin-bottom: -1px;
    display: flex; align-items: center; gap: 8px;
    transition: color .12s;
    letter-spacing: 0.01em;
  }
  .tab:hover { color: var(--ink); }
  .tab.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
    font-weight: 500;
  }
  .tab-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    font-weight: 400;
    letter-spacing: 0.04em;
  }
  .tab.active .tab-count { color: var(--ink-2); }

  /* —— toolbar —— */
  .toolbar {
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    padding: 22px 0 24px;
  }
  .toolbar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
  }
  .chip-group { display: flex; gap: 18px; align-items: center; }
  .chip {
    background: none; border: none; cursor: pointer;
    padding: 0;
    font-family: var(--font-sans);
    font-size: 13px; color: var(--ink-3);
    display: flex; align-items: center; gap: 7px;
    letter-spacing: 0.005em;
  }
  .chip:hover { color: var(--ink); }
  .chip.active { color: var(--ink); font-weight: 500; }
  .chip.active .chip-dot { background: var(--ink); }
  .chip-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block;
    background: var(--ink-5);
    border: 1px solid var(--ink-5);
  }
  .chip.active.chip-chi .chip-dot { background: var(--chi); border-color: var(--chi); }
  .chip.active.chip-mot .chip-dot { background: var(--mot); border-color: var(--ink-3); }

  /* —— view-mode segmented control (replaces single mono toggle) —— */
  .view-group {
    display: flex; align-items: center; gap: 14px;
    margin-left: auto;
  }
  .seg {
    display: inline-flex;
    border: 1px solid var(--line-2);
    border-radius: 2px;
    overflow: hidden;
    background: var(--paper);
  }
  .seg-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 12px;
    font-family: var(--font-sans);
    font-size: 12px;
    color: var(--ink-3);
    letter-spacing: 0.01em;
    display: inline-flex; align-items: center; gap: 7px;
    transition: background .12s, color .12s;
    border-right: 1px solid var(--line-2);
  }
  .seg-btn:last-child { border-right: none; }
  .seg-btn:hover { color: var(--ink); }
  .seg-btn.active {
    background: var(--ink);
    color: var(--paper);
    font-weight: 500;
  }
  .seg-btn .glyph {
    font-family: var(--font-mono);
    font-size: 10px;
    opacity: 0.75;
  }
  .seg-btn.active .glyph { opacity: 1; }

  /* —— transcript (Leipzig-style interlinear glosses) —— */
  .transcript {
    border-top: 1px solid var(--line);
    padding: 8px 0;
  }
  .utt {
    display: grid;
    grid-template-columns: 44px 1fr 64px;
    gap: 18px;
    padding: 26px 0 22px;
    border-bottom: 1px solid var(--line);
    align-items: flex-start;
  }
  .utt:last-child { border-bottom: none; }
  /* CHI utterances get a 2px ink rule to set the rhythm of dyadic exchange */
  .utt.chi { box-shadow: inset 2px 0 0 var(--ink); background-color: aliceblue; padding-left: 16px; margin-left: -16px; }
  .utt.mot { box-shadow: inset 1px 0 0 var(--line-2); padding-left: 16px; margin-left: -16px; }

  .ex-num {
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    padding-top: 2px;
    text-align: left;
    letter-spacing: 0.01em;
  }
  .ex-num .spk {
    display: block;
    margin-top: 6px;
    font-family: var(--font-sans);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--ink-3);
  }
  .utt.chi .ex-num .spk { color: var(--ink); }

  .utt-body {
    display: flex;
    flex-wrap: wrap;
    gap: 0 14px;
    align-items: flex-start;
    row-gap: 0;
  }
  .utt-body.annot { gap: 22px 18px; }

  .word {
    display: inline-flex; flex-direction: column;
    align-items: flex-start;
    line-height: 1.7;
  }
  .word.annot { line-height: 1.35; }
  .word-form {
    font-family: var(--font-sans);
    font-size: 17px;
    color: var(--ink);
    font-weight: 400;
    letter-spacing: -0.005em;
  }
  .word.annot .word-form {
    margin-bottom: 4px;
  }
  .word-gra {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-2);
    letter-spacing: 0.01em;
    margin-top: 3px;
    white-space: nowrap;
  }
  .pos-tag {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.14em;
    color: var(--ink-3);
    margin-top: 4px;
    line-height: 1.4;
    text-transform: uppercase;
  }

  .free-trans {
    margin-top: 10px;
    font-size: 13px;
    color: var(--ink-2);
    font-style: italic;
    letter-spacing: 0.005em;
    line-height: 1.5;
  }
  .free-trans::before { content: "\2018"; font-style: normal; color: var(--ink-3); margin-right: 1px; }
  .free-trans::after  { content: "\2019"; font-style: normal; color: var(--ink-3); margin-left: 1px; }
  .utt-notes {
    font-family: var(--font-sans);
    font-size: 11px;
    color: var(--ink-4);
    margin-top: 4px;
    padding-left: 1px;
    font-style: normal;
  }
  .utt-notes::before {
    content: "note: ";
    font-family: var(--font-mono);
    font-size: 9.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-5);
    margin-right: 4px;
  }

  .utt-id {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    padding-top: 4px;
    letter-spacing: 0.06em;
    text-align: right;
  }

  /* —— frequency view —— */
  .freq-grid {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 48px;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }
  .freq-summary { padding-right: 0; }
  .freq-summary h3 {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-4);
    margin-bottom: 18px;
    font-weight: 500;
  }
  .pos-list { display: flex; flex-direction: column; gap: 0; }
  .pos-row {
    display: grid;
    grid-template-columns: 60px 1fr 32px;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    padding: 8px 0;
    border-bottom: 1px solid var(--line);
  }
  .pos-row:hover .pos-pill { color: var(--ink); }
  .pos-row.selected .pos-pill { color: var(--ink); font-weight: 600; }
  .pos-row.selected .bar-fill { background: var(--ink); }
  .pos-row .bar-track {
    height: 2px; background: var(--paper-3); overflow: hidden;
  }
  .pos-row .bar-fill { height: 100%; background: var(--ink-3); transition: background .15s; }
  .pos-row .count {
    text-align: right;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    font-variant-numeric: tabular-nums;
  }
  .pos-row.selected .count { color: var(--ink); }

  .freq-table-wrap { overflow-x: auto; }
  table.freq {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  table.freq thead th {
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-4);
    text-align: left;
    padding: 0 14px 12px 0;
    border-bottom: 1px solid var(--line-2);
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  table.freq thead th:first-child { padding-left: 0; }
  table.freq thead th.num { text-align: right; }
  table.freq thead th.center { text-align: left; }
  table.freq thead th:hover { color: var(--ink-2); }
  table.freq thead th .arr { color: var(--ink); margin-left: 4px; }
  table.freq thead th .arr.dim { color: var(--ink-5); }

  table.freq tbody td {
    padding: 12px 14px 12px 0;
    border-bottom: 1px solid var(--line);
    vertical-align: middle;
  }
  table.freq tbody td:first-child { padding-left: 0; }
  table.freq tbody tr:hover td { color: var(--ink); }

  td.word-cell {
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
    width: 1%;
    white-space: nowrap;
    letter-spacing: -0.005em;
  }
  td.bar-cell { width: 30%; min-width: 140px; }
  .freq-bar {
    display: flex; align-items: center; gap: 10px;
    height: 16px;
  }
  .freq-bar-track {
    flex: 1;
    height: 4px;
    background: var(--paper-3);
    position: relative;
  }
  .freq-bar-fill {
    height: 100%;
    background: var(--ink);
  }
  .freq-bar-num {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    min-width: 22px;
    text-align: right;
  }

  td.lemma-cell { color: var(--ink-2); font-size: 13px; }
  td.gloss-cell { color: var(--ink-3); font-size: 12px; }
  td.mor-cell { font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); white-space: nowrap; letter-spacing: 0.02em; }
  td.mc-cell { text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--ink-3); font-variant-numeric: tabular-nums; }
  td.pos-cell { text-align: left; }

  .pos-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    text-transform: uppercase;
  }

  /* —— footer —— */
  .footer {
    margin-top: 56px;
    padding-top: 18px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .footer a { color: var(--ink-3); text-decoration: none; }
  .footer a:hover { color: var(--ink); }

  /* —— site nav (top of every page) —— */
  .site-nav {
    border-bottom: 1px solid var(--line);
    background: var(--paper);
    position: relative;
    z-index: 60;
  }
  .site-nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 16px 32px;
    display: flex;
    align-items: center;
    gap: 36px;
  }
  .site-brand {
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.18em;
    color: var(--ink);
    text-decoration: none;
  }
  .site-nav-items {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 28px;
  }
  .site-nav-item {
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink-3);
    text-decoration: none;
    letter-spacing: 0.02em;
    padding: 6px 0;
    border-bottom: 1px solid transparent;
    transition: color .12s, border-color .12s;
  }
  .site-nav-item:hover { color: var(--ink); }
  .site-nav-item.active {
    color: var(--ink);
    border-bottom-color: var(--ink);
  }

  /* —— back-to-top floating button —— */
  .back-to-top {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 40px;
    height: 40px;
    border: 1px solid var(--line-2);
    background: var(--paper);
    color: var(--ink-3);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    opacity: 0;
    pointer-events: none;
    transform: translateY(8px);
    transition: opacity .2s, transform .2s, color .12s, border-color .12s;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .back-to-top.visible {
    opacity: 1;
    pointer-events: auto;
    transform: translateY(0);
  }
  .back-to-top:hover {
    color: var(--ink);
    border-color: var(--ink-3);
  }

  /* —— site nav (top of every page) —— end */

  /* —— sticky header (compressed-on-scroll) —— */
  .sticky-head {
    position: sticky;
    top: 0;
    background: var(--paper);
    z-index: 50;
    /* keep the existing internal section borders working */
  }
  /* compressed bar baseline styling lives below in the transition block */
  /* expanded blocks fade in/out — calmer than display:none flicker */
  .sticky-head .masthead,
  .sticky-head .meta-row,
  .sticky-head .stats {
    transition: opacity .14s ease-out, max-height .18s ease-out;
    overflow: hidden;
  }
  .sticky-head.scrolled .masthead,
  .sticky-head.scrolled .meta-row,
  .sticky-head.scrolled .stats {
    opacity: 0;
    max-height: 0;
    padding-top: 0;
    padding-bottom: 0;
    border-bottom-color: transparent;
    pointer-events: none;
  }
  .sticky-head.scrolled .masthead { margin-bottom: 0; }
  .compressed-bar {
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity .14s ease-out, max-height .18s ease-out;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid transparent;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.06em;
    display: flex;
    padding: 0;
  }
  .sticky-head.scrolled .compressed-bar {
    opacity: 1;
    max-height: 60px;
    padding: 12px 0 13px;
    border-bottom-color: var(--line);
  }
  .compressed-bar .cb-id {
    color: var(--ink);
    font-weight: 500;
    letter-spacing: 0.08em;
    font-size: 12px;
  }
  .compressed-bar .cb-sep { color: var(--ink-5); }
  .compressed-bar .cb-meta { color: var(--ink-3); font-family: var(--font-sans); font-size: 12px; letter-spacing: 0.01em; }
  .compressed-bar .cb-tab { color: var(--ink-4); text-transform: uppercase; letter-spacing: 0.1em; font-size: 10px; }
  .compressed-bar .cb-right { margin-left: auto; }

  /* —— citation buttons —— */
  .cite-btn-inline {
    background: none;
    border: 1px solid var(--line-2);
    cursor: pointer;
    padding: 4px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: color .12s, border-color .12s;
  }
  .cite-btn-inline:hover { color: var(--ink); border-color: var(--ink-3); }
  .cite-btn-inline.copied { color: var(--ink); border-color: var(--ink); }

  .cite-btn-tiny {
    display: block;
    margin-top: 6px;
    opacity: 0;
    background: none;
    border: none;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0;
    transition: opacity .15s, color .12s;
    text-align: right;
    width: 100%;
  }
  .utt:hover .cite-btn-tiny { opacity: 1; }
  .cite-btn-tiny:hover { color: var(--ink); }
  .cite-btn-tiny.copied { opacity: 1; color: var(--ink); }

  .utt-anchor {
    color: var(--ink-4);
    text-decoration: none;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    transition: color .12s;
  }
  .utt-anchor:hover { color: var(--ink); }
  /* highlight the anchored utterance briefly */
  .utt:target {
    background: var(--paper-2);
    box-shadow: -3px 0 0 var(--ink);
    transition: background .4s, box-shadow .4s;
  }

  /* —— footer with logos —— */
  .footer {
    margin-top: 56px;
    padding-top: 22px;
    padding-bottom: 18px;
    border-top: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 24px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .footer-meta { display: flex; gap: 12px; align-items: center; }
  .footer-meta .footer-sep { color: var(--ink-5); }
  .footer-logos { display: flex; gap: 26px; align-items: center; }
  .footer-logo {
    display: inline-flex;
    align-items: center;
    line-height: 1;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-4);
    letter-spacing: 0.06em;
    border: 1px dashed var(--line-2);
    padding: 8px 12px;
    text-decoration: none;
    transition: color .15s, border-color .15s;
  }
  .footer-logo:hover { color: var(--ink); border-color: var(--ink-3); }

  .footer-logo img {
    height: 38px;
    width: auto;
    opacity: 0.72;
    filter: grayscale(1);
    transition: opacity .15s, filter .15s;
  }
  .footer-logo:hover img {
    opacity: 1;
    filter: grayscale(0);
  }
  /* small */
  @media (max-width: 880px) {
    .freq-grid { grid-template-columns: 1fr; }
    .meta-row { grid-template-columns: repeat(2, 1fr); }
    .meta-cell:nth-child(2) { border-right: none; }
    .meta-cell:nth-child(1), .meta-cell:nth-child(2) { border-bottom: 1px solid var(--line); }
    .stats { grid-template-columns: repeat(3, 1fr); }
    .footer { flex-direction: column; align-items: flex-start; gap: 16px; }
  }

</style>

/* ——————————— citation ——————————— */

function copyText(s) {
  if (navigator.clipboard) {
    return navigator.clipboard.writeText(s).then(()=>true).catch(()=>false);
  }
  // fallback
  const t = document.createElement("textarea");
  t.value = s; document.body.appendChild(t); t.select();
  try { document.execCommand("copy"); document.body.removeChild(t); return Promise.resolve(true); }
  catch { document.body.removeChild(t); return Promise.resolve(false); }
}

function sessionCitation(fileId, file) {
  return `${fileId} [recorded ${file.date}, ${file.group.name} (${file.group.acr}), age ${file.age}]. ` +
         `Georgian Child Language Sketch, Ilia State University.`;
}

function utteranceCitation(fileId, file, u) {
  const text = u.words.map(w => w.form).join(" ") + (u.punct || "");
  return `${file.group.acr}, ${file.age}, ${u.uID} (${u.who}): "${text}"\n` +
         `— ${fileId}, Georgian Child Language Sketch, Ilia State University.`;
}

function useCopyState(timeoutMs = 1400) {
  const [copied, setCopied] = useState(false);
  const trigger = (text) => {
    copyText(text).then(ok => {
      if (!ok) return;
      setCopied(true);
      setTimeout(() => setCopied(false), timeoutMs);
    });
  };
  return [copied, trigger];
}

function CiteSessionBtn({fileId, file, className}) {
  const [copied, trigger] = useCopyState();
  return (
    <button
      className={"cite-btn-inline" + (copied ? " copied" : "") + (className ? " " + className : "")}
      onClick={() => trigger(sessionCitation(fileId, file))}
      title="ციტირება / Copy session citation"
    >{copied ? "✓ copied" : "cite session"}</button>
  );
}

function FrequencyView() {
  const [spk, setSpk] = useState("CHI");
  const [posF, setPosF] = useState("ALL");
  const [sortKey, setSortKey] = useState("freq");
  const [sortDir, setSortDir] = useState(-1);

  // active dataset for the chosen speaker filter — ALL merges by form,
  // summing freq across CHI and MOT
  const activeData = useMemo(() => {
    if (spk === "CHI") return freqDataChi;
    if (spk === "MOT") return freqDataMot;
    // ALL — merge
    const m = new Map();
    const ingest = (rows) => {
      for (const r of rows) {
        const prev = m.get(r.word);
        if (prev) prev.freq += r.freq;
        else m.set(r.word, {...r});
      }
    };
    ingest(freqDataChi);
    ingest(freqDataMot);
    return [...m.values()];
  }, [spk]);

  const posCounts = useMemo(() => {
    const m = {};
    activeData.forEach(r => { m[r.pos] = (m[r.pos] || 0) + r.freq; });
    return Object.entries(m).sort((a,b) => b[1] - a[1]);
  }, [activeData]);
  const totalFreq = posCounts.reduce((s, [,n]) => s + n, 0);
  const maxPos = Math.max(...posCounts.map(([,n]) => n), 1);

  const filtered = useMemo(() => {
    let r = activeData;
    if (posF !== "ALL") r = r.filter(x => x.pos === posF);
    return [...r].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (typeof av === "number") return sortDir * (av - bv);
      return sortDir * String(av).localeCompare(String(bv), "ka");
    });
  }, [activeData, posF, sortKey, sortDir]);

  const maxFreq = Math.max(...filtered.map(r => r.freq), 1);

  const toggleSort = k => {
    if (sortKey === k) setSortDir(d => -d);
    else { setSortKey(k); setSortDir(-1); }
  };

  const Arr = ({k}) => sortKey !== k
    ? <span className="arr dim">↕</span>
    : <span className="arr">{sortDir === -1 ? "↓" : "↑"}</span>;

  return (
    <div>
      <div className="toolbar">
        <span className="toolbar-label">მოსაუბრე</span>
        <div className="chip-group">
          <button className={"chip" + (spk==="CHI" ? " active" : "")} onClick={()=>setSpk("CHI")}>
            CHI · ბავშვი
          </button>
          <button className={"chip chip-mot" + (spk==="MOT" ? " active" : "")} onClick={()=>setSpk("MOT")}>
            მზრუნველი · Caregiver
          </button>
          <button className={"chip" + (spk==="ALL" ? " active" : "")} onClick={()=>setSpk("ALL")}>
            ALL
          </button>
        </div>
      </div>
      <div className="freq-grid">
      <aside className="freq-summary">
        <h3>Parts of speech</h3>
        <div className="pos-list">
          <div
            className={"pos-row" + (posF === "ALL" ? " selected" : "")}
            onClick={() => setPosF("ALL")}
          >
            <span className="pos-pill">ALL</span>
            <span className="bar-track">
              <span className="bar-fill" style={{width:"100%"}}></span>
            </span>
            <span className="count">{totalFreq}</span>
          </div>
          {posCounts.map(([pos, n]) => (
            <div
              key={pos}
              className={"pos-row" + (posF === pos ? " selected" : "")}
              onClick={() => setPosF(pos)}
            >
              <PosTag pos={pos} big />
              <span className="bar-track">
                <span className="bar-fill" style={{width: (n / maxPos * 100) + "%"}}></span>
              </span>
              <span className="count">{n}</span>
            </div>
          ))}
        </div>
        <div style={{marginTop:18, paddingTop:14, borderTop:"1px solid var(--line)", fontSize:11, color:"var(--ink-4)", lineHeight:1.5}}>
          ფილტრის შესაცვლელად დააჭირეთ POS კატეგორიას. <strong style={{color:"var(--ink-2)", fontWeight:600}}>{filtered.length}</strong> ჩანაწერი ნაჩვენებია.
        </div>
      </aside>

      <div className="freq-table-wrap">
        <table className="freq">
          <thead>
            <tr>
              <th onClick={() => toggleSort("word")}>სიტყვა <Arr k="word"/></th>
              <th onClick={() => toggleSort("freq")} style={{minWidth:160}}>სიხშირე <Arr k="freq"/></th>
              <th onClick={() => toggleSort("lemma")}>ლემა <Arr k="lemma"/></th>
              <th onClick={() => toggleSort("gloss")}>Gloss <Arr k="gloss"/></th>
              <th className="center">POS</th>
              <th>მორფემები</th>
              <th className="num" onClick={() => toggleSort("mc")}>MC <Arr k="mc"/></th>
            </tr>
          </thead>
          <tbody>
            {filtered.map(row => {
              const pct = (row.freq / maxFreq) * 100;
              return (
                <tr key={row.word}>
                  <td className="word-cell">{row.word}</td>
                  <td className="bar-cell">
                    <div className="freq-bar">
                      <div className="freq-bar-track">
                        <div className="freq-bar-fill" style={{width: pct + "%"}}></div>
                      </div>
                      <span className="freq-bar-num">{row.freq}</span>
                    </div>
                  </td>
                  <td className="lemma-cell">{row.lemma}</td>
                  <td className="gloss-cell">{row.gloss}</td>
                  <td className="pos-cell"><PosTag pos={row.pos} big /></td>
                  <td className="mor-cell">{row.morphemes}</td>
                  <td className="mc-cell">{row.mc}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
        {filtered.length === 0 && (
          <div style={{padding:"40px 20px", textAlign:"center", color:"var(--ink-4)", fontSize:13}}>
            ამ კატეგორიაში ჩანაწერი არ მოიძებნა.
          </div>
        )}
      </div>
    </div>
   </div>
  );
}

function App() {
  const [tab, setTab] = useState("transcript");
  const [fileId, setFileId] = useState("ANA30614");
  const [scrolled, setScrolled] = useState(false);
  const file = findFile(fileId);

  // session-level totals from the transcript itself (single source of truth)
  const chiCount = transcript.filter(u => u.who === "CHI").length;
  const motCount = transcript.filter(u => u.who === "MOT").length;
  const wordCount = transcript.reduce((s, u) => s + u.words.length, 0);
  const lemmaCount = (() => {
    const s = new Set();
    transcript.forEach(u => u.words.forEach(w => { if (w.lemma) s.add(w.lemma); }));
    return s.size;
  })();

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 80);
    window.addEventListener("scroll", onScroll, { passive: true });
    onScroll();
    return () => window.removeEventListener("scroll", onScroll);
  }, []);

  return (
    <div className="shell">
      <FileNav selected={fileId} onSelect={setFileId} />
      <div className="main">
        <header className={"sticky-head" + (scrolled ? " scrolled" : "")}>
          <Masthead fileId={fileId} file={file}/>
          <MetaRow file={file}/>
          <StatsStrip
            uttCount={transcript.length}
            chiCount={chiCount}
            motCount={motCount}
            wordCount={wordCount}
            lemmaCount={lemmaCount}
          />
          <CompressedBar fileId={fileId} file={file} tab={tab}/>
          <nav className="tabs">
            <button
              className={"tab" + (tab === "transcript" ? " active" : "")}
              onClick={() => setTab("transcript")}
            >
              ტრანსკრიპტი
              <span className="tab-count">{transcript.length}</span>
            </button>
            <button
              className={"tab" + (tab === "frequency" ? " active" : "")}
              onClick={() => setTab("frequency")}
            >
              სიხშირე
              <span className="tab-count">{(() => {
                const s = new Set();
                freqDataChi.forEach(r => s.add(r.word));
                freqDataMot.forEach(r => s.add(r.word));
                return s.size;
              })()}</span>
            </button>
          </nav>
        </header>

        <main style={{paddingTop: 4}}>
          {tab === "transcript" ? <TranscriptView fileId={fileId} file={file}/> : <FrequencyView/>}
        </main>

        <footer className="footer">
          <div className="footer-meta">
            <span>GCLS · Ilia State University · Tbilisi</span>
            <span className="footer-sep">·</span>
            <span>CHAT / CHILDES compatible</span>
          </div>
          <div className="footer-logos">
            <a href="https://iliauni.edu.ge" target="_blank" rel="noopener" className="footer-logo" title="Ilia State University">
              <img src="assets/Iliaunilogo.png" alt="Ilia State University"/>
            </a>
            <a href="https://rustaveli.org.ge" target="_blank" rel="noopener" className="footer-logo" title="Shota Rustaveli National Science Foundation of Georgia">
              <img src="assets/GE_Shota_web.jpg" alt="SRNSFG"/>
            </a>
          </div>
        </footer>
        <BackToTop visible={scrolled}/>
      </div>
    </div>
  );
}
